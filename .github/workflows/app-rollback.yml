name: App Rollback

# Reusable manual rollback for Centrifuge app repos (call from a
# workflow_dispatch caller):
#   prod    → instant traffic shift: look up the Cloudflare Workers version
#             tagged with the release tag and `versions deploy <id>@100%`.
#             No rebuild — the version must have been staged for that tag.
#   staging → re-point the staging preview alias: download the release bundle
#             zip from the GitHub release, then `versions upload
#             --preview-alias staging`.
#
# GitHub Environments (`production`, `staging`) resolve against the CALLER's
# repo, so environment protection rules gate the rollback.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to roll back to (e.g., v1.2.0)'
        required: true
        type: string
      environment:
        description: "Environment to roll back ('staging' or 'prod')"
        required: false
        type: string
        default: 'prod'
      app-name:
        description: 'App name (used in log output)'
        required: true
        type: string
      bundle-name-prefix:
        description: 'Prefix of the release bundle zip name; defaults to app-name'
        required: false
        type: string
        default: ''
      cloudflare-account-id:
        description: 'Cloudflare account ID (a repository variable, not a secret)'
        required: true
        type: string
      wrangler-version:
        description: 'Wrangler version to use'
        required: false
        type: string
        default: '4.33.1'
    secrets:
      cloudflare-api-token:
        description: 'Cloudflare API token'
        required: true

jobs:
  rollback:
    name: 'Roll Back ${{ inputs.app-name }} to ${{ inputs.tag }} on ${{ inputs.environment }}'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment == 'prod' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: '📥 Checkout Code from Release Tag'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: '🟢 Setup Node.js'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: '📦 Install Wrangler'
        shell: sh
        env:
          WRANGLER_VERSION: ${{ inputs.wrangler-version }}
        run: npm install -g "wrangler@$WRANGLER_VERSION"

      - name: '📦 Download Release Bundle'
        if: inputs.environment != 'prod'
        shell: sh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
          BUNDLE_PREFIX: ${{ inputs.bundle-name-prefix || inputs.app-name }}
        run: |
          BUNDLE_NAME="${BUNDLE_PREFIX}-bundle${TAG}.zip"
          gh release download "$TAG" \
            --repo "$GH_REPOSITORY" \
            --pattern "$BUNDLE_NAME"
          rm -rf dist
          unzip "$BUNDLE_NAME" -d dist

      - name: '⚙️ Determine wrangler command'
        id: wrangler-command
        shell: sh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare-api-token }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
        run: |
          if [ "$INPUT_ENVIRONMENT" = "prod" ]; then
            # Look up the version already staged for this tag.
            WORKER_NAME=$(grep -A1 "\[env.prod\]" wrangler.toml | grep "name" | cut -d'"' -f2)
            VERSION_ID=$(wrangler versions list --name "$WORKER_NAME" --env prod --json | jq -r ".[] | select(.annotations.\"workers/tag\" == \"$TAG\") | .id" | head -1)
            if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
              echo "::error::No Cloudflare version found for tag $TAG"
              echo "Available tags:"
              wrangler versions list --name "$WORKER_NAME" --env prod --json | jq -r ".[].annotations.\"workers/tag\""
              exit 1
            fi
            CMD="versions deploy $VERSION_ID@100% --env prod --yes"
          elif [ "$INPUT_ENVIRONMENT" = "staging" ]; then
            CMD="versions upload --env prod --message \"Rollback to $TAG\" --preview-alias staging"
          else
            echo "::error::Environment '$INPUT_ENVIRONMENT' is not supported (use 'staging' or 'prod')."
            exit 1
          fi
          echo "Wrangler command: $CMD"
          echo "cmd=$CMD" >> $GITHUB_OUTPUT

      - name: '🚀 Deploy to Cloudflare'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.cloudflare-api-token }}
          accountId: ${{ inputs.cloudflare-account-id }}
          gitHubToken: ${{ github.token }}
          command: ${{ steps.wrangler-command.outputs.cmd }}
          wranglerVersion: ${{ inputs.wrangler-version }}
        id: deploy

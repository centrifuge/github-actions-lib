name: App Build & Deploy Release

# Reusable release pipeline, driven by the caller's `release` events:
#   prereleased → mainnet build (bundle attached to the release) → staging
#                 (`versions upload --preview-alias staging`, tagged with the
#                 release tag) → optionally public-demo
#               → optionally a parallel testnet build (own bundle attached to
#                 the release) deployed to a dedicated testnet Worker
#                 (`deploy --env testnet`, e.g. *.testnet.centrifuge.io)
#   released    → promote the staged version to production
#                 (`versions deploy <id>@100%` looked up by tag)
#
# A tag MUST be prereleased before it can be released: production promotes
# the version staging uploaded, and the bundle only exists after the
# prerelease build.
#
# Release bundles are immutable: re-running the prerelease build for a tag
# whose bundle already exists fails. Cut a new prerelease for new code, or
# delete the asset from the release page to rebuild the same tag.
#
# GitHub Environments (`staging`, `public-demo`, `production`) resolve
# against the caller's repo. Caller permissions ceiling: contents: write
# (release bundle upload), deployments: write.

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Prefix for run-scoped build artifact names'
        required: true
        type: string
      bundle-name-prefix:
        description: 'Prefix for the release bundle zip name; defaults to app-name'
        required: false
        type: string
        default: ''
      node-version:
        description: 'Node.js version to use'
        required: true
        type: string
      build-args:
        description: 'Extra arguments passed to `pnpm build`'
        required: false
        type: string
        default: '--mode mainnet'
      build-env:
        description: 'Multiline KEY=VALUE pairs exported to the build step environment'
        required: false
        type: string
        default: ''
      pool-cache-base-url:
        description: 'Optional account-specific pool-cache Worker base URL'
        required: false
        type: string
        default: ''
      cloudflare-account-id:
        description: 'Cloudflare account ID (a repository variable, not a secret)'
        required: true
        type: string
      deploy-public-demo:
        description: 'Whether prereleases also deploy to the public-demo environment'
        required: false
        type: boolean
        default: false
      deploy-testnet:
        description: >-
          Whether prereleases also run a parallel testnet build and deploy it
          to the caller's `testnet` Worker (wrangler.toml `[env.testnet]`)
        required: false
        type: boolean
        default: false
      testnet-build-args:
        description: 'Extra arguments passed to `pnpm build` for the testnet build'
        required: false
        type: string
        default: '--mode testnet'
      testnet-build-env:
        description: 'Multiline KEY=VALUE pairs exported to the testnet build step environment'
        required: false
        type: string
        default: ''
      testnet-url:
        description: 'Fixed testnet URL for the GitHub deployment record (falls back to the wrangler deployment URL)'
        required: false
        type: string
        default: ''
      production-url:
        description: 'Fixed production URL for the GitHub deployment record (falls back to the wrangler deployment URL)'
        required: false
        type: string
        default: ''
    secrets:
      cloudflare-api-token:
        description: 'Cloudflare API token'
        required: true
    outputs:
      staging-url:
        description: 'Staging deployment URL (prereleased only)'
        value: ${{ jobs.deploy-staging.outputs.deployment-url }}
      testnet-url:
        description: 'Testnet deployment URL (prereleased with deploy-testnet only)'
        value: ${{ jobs.deploy-testnet.outputs.deployment-url }}
      production-url:
        description: 'Production deployment URL (released only)'
        value: ${{ jobs.deploy-production.outputs.deployment-url }}

jobs:
  # One build per release, shared via `needs: build`. Artifact names are
  # immutable per run — never add a second build job for the same app-name on
  # the same trigger.
  build:
    runs-on: ubuntu-latest
    if: github.event.action == 'prereleased'
    environment: staging
    permissions:
      # gh release upload of the built bundle
      contents: write
    steps:
      - name: '📥 Checkout Code from Release Tag'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # build-app receives the token explicitly; keep it out of .git/config
          persist-credentials: false

      - name: '🔨 Build App'
        id: build
        uses: centrifuge/github-actions-lib/actions/build-app@main
        with:
          app-name: ${{ inputs.app-name }}
          bundle-name-prefix: ${{ inputs.bundle-name-prefix }}
          node-version: ${{ inputs.node-version }}
          build-args: ${{ inputs.build-args }}
          build-env: ${{ inputs.build-env }}
          pool-cache-base-url: ${{ inputs.pool-cache-base-url }}
          github-token: ${{ github.token }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action == 'prereleased'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      # wrangler-action records a GitHub deployment for the environment URL
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: '🚀 Deploy App to Staging'
        id: deploy
        uses: centrifuge/github-actions-lib/actions/deploy-app@main
        with:
          environment: staging
          app-name: ${{ inputs.app-name }}
          cloudflare-api-token: ${{ secrets.cloudflare-api-token }}
          cloudflare-account-id: ${{ inputs.cloudflare-account-id }}
          github-token: ${{ github.token }}

  deploy-public-demo:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action == 'prereleased' && inputs.deploy-public-demo
    environment:
      name: public-demo
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: '🚀 Deploy App to Public Demo'
        id: deploy
        uses: centrifuge/github-actions-lib/actions/deploy-app@main
        with:
          environment: public-demo
          app-name: ${{ inputs.app-name }}
          cloudflare-api-token: ${{ secrets.cloudflare-api-token }}
          cloudflare-account-id: ${{ inputs.cloudflare-account-id }}
          github-token: ${{ github.token }}

  # Parallel testnet pipeline: a second build (testnet mode) under the
  # `<app-name>-testnet` artifact name — artifact names are immutable per
  # run, so it must not collide with the mainnet build. Its bundle is
  # attached to the release as `<bundle-prefix>-testnet-bundle<tag>.zip`,
  # which keeps testnet rollbacks possible via app-rollback.yml.
  build-testnet:
    runs-on: ubuntu-latest
    if: github.event.action == 'prereleased' && inputs.deploy-testnet
    permissions:
      # gh release upload of the built testnet bundle
      contents: write
    steps:
      - name: '📥 Checkout Code from Release Tag'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: '🔨 Build App (testnet)'
        id: build
        uses: centrifuge/github-actions-lib/actions/build-app@main
        with:
          app-name: ${{ inputs.app-name }}-testnet
          bundle-name-prefix: ${{ format('{0}-testnet', inputs.bundle-name-prefix || inputs.app-name) }}
          node-version: ${{ inputs.node-version }}
          build-args: ${{ inputs.testnet-build-args }}
          build-env: ${{ inputs.testnet-build-env }}
          # No pool-cache-base-url: there is no testnet pool-cache Worker;
          # testnet builds fall back to the repo's prebuilt snapshot.
          github-token: ${{ github.token }}

  # Direct deploy to the standalone testnet Worker (wrangler.toml
  # `[env.testnet]`) — no staging alias or version promotion involved.
  deploy-testnet:
    runs-on: ubuntu-latest
    needs: build-testnet
    if: github.event.action == 'prereleased' && inputs.deploy-testnet
    environment:
      name: testnet
      url: ${{ inputs.testnet-url || steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      # wrangler-action records a GitHub deployment for the environment URL
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: '🚀 Deploy App to Testnet'
        id: deploy
        uses: centrifuge/github-actions-lib/actions/deploy-app@main
        with:
          environment: testnet
          app-name: ${{ inputs.app-name }}-testnet
          cloudflare-api-token: ${{ secrets.cloudflare-api-token }}
          cloudflare-account-id: ${{ inputs.cloudflare-account-id }}
          github-token: ${{ github.token }}

  # `released` promotes the version already staged for this tag; deploy-app
  # skips download-artifact for prod, so no `needs: build`.
  deploy-production:
    runs-on: ubuntu-latest
    if: github.event.action == 'released'
    environment:
      name: production
      url: ${{ inputs.production-url || steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: '📥 Checkout Code'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: '🚀 Deploy App to Production'
        id: deploy
        uses: centrifuge/github-actions-lib/actions/deploy-app@main
        with:
          environment: prod
          app-name: ${{ inputs.app-name }}
          cloudflare-api-token: ${{ secrets.cloudflare-api-token }}
          cloudflare-account-id: ${{ inputs.cloudflare-account-id }}
          github-token: ${{ github.token }}

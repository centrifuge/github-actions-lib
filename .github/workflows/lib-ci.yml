name: Lib CI

# This library is the trusted root of the app pipelines (consumers reference
# it @main), so its own CI must stay strict: workflow schema validation,
# SHA-pinning enforcement, and YAML lint on every change.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run actionlint
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          bash <(curl -sSfL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") "$ACTIONLINT_VERSION"
          # -ignore: github.job_workflow_sha is a real, documented github-context
          # property (the commit SHA of the reusable workflow file) used to check
          # out this library at the exact version the caller pinned — but
          # actionlint's github-context model doesn't include it yet, so it
          # false-positives. Drop this once actionlint learns the property.
          ./actionlint -color \
            -ignore 'property "job_workflow_sha" is not defined in object type'

  pinned-actions-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Verify all GitHub Actions are SHA-pinned
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: 'true'

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run yamllint
        run: |
          pip install --user yamllint
          ~/.local/bin/yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github actions
